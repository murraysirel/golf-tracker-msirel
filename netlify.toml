[build]
  publish = "."
  functions = "netlify/functions"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# No server-side redirect — domain-aware routing handled in index.html
# loopercaddie.com → waitlist (client-side redirect)
# loopercaddie.netlify.app → app (no redirect)
